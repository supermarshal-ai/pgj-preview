<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>橋本真和 パッティングアカデミー</title>
<style>
  :root{--navy:#1c2e40;--cream:#f6f5f3;--champagne:#d5c6a0;--bronze:#5e4d35;
    --sans:"Helvetica Neue",Helvetica,Arial,"Hiragino Sans","Yu Gothic",sans-serif;
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,Georgia,serif;
    --mono:ui-monospace,Menlo,Monaco,monospace;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--navy);color:var(--cream);font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;padding:32px;-webkit-font-smoothing:antialiased;
    font-feature-settings:"palt"}
  .wrap{max-width:760px;width:100%}
  .k{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--champagne)}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(28px,6vw,46px);line-height:1.25;margin:16px 0 10px}
  .sub{color:rgba(244,243,238,.72);margin:0 0 36px;font-size:16px;line-height:1.7;max-width:560px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:600px){.cards{grid-template-columns:1fr}}
  a.card{display:block;text-decoration:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);
    border-radius:12px;padding:26px 26px 24px;color:var(--cream);transition:transform .15s,border-color .15s,background .15s}
  a.card:hover{transform:translateY(-3px);border-color:var(--champagne);background:rgba(213,198,160,.08)}
  a.card .n{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--champagne)}
  a.card h2{font-family:var(--serif);font-weight:400;font-size:22px;margin:12px 0 6px}
  a.card p{margin:0;font-size:13.5px;color:rgba(244,243,238,.66);line-height:1.6}
  a.card .go{display:inline-block;margin-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--champagne)}
  .foot{margin-top:32px;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:rgba(244,243,238,.4);line-height:1.8}
</style>
</head>
<body>
  <div class="wrap">
    <div class="k">Preserve Golf Japan</div>
    <h1>橋本真和<br>パッティングアカデミー</h1>
    <p class="sub">事業提案と、オンラインアカデミーの画面イメージです。下のカードからご覧ください。</p>
    <div class="cards">
      <a class="card" href="deck.html">
        <div class="n">01 / 提案</div>
        <h2>事業提案書</h2>
        <p>ビジョン・商品設計・コンテンツ計画・スケジュール（全15項）。</p>
        <span class="go">開く →</span>
      </a>
      <a class="card" href="academy.html">
        <div class="n">02 / デモ</div>
        <h2>アカデミー画面イメージ</h2>
        <p>会員が見る学習画面のインタラクティブなモック。</p>
        <span class="go">開く →</span>
      </a>
    </div>
    <p class="foot">CONFIDENTIAL ・ 提案ドラフト ・ 数値はすべて検証前のイメージです<br>※レッスン名・構成はサンプル。実際の内容は橋本さんが設計します。</p>
  </div>
</body>
</html>

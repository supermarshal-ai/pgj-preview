<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>橋本真和 パッティングアカデミー</title>
<style>
  :root{--bg:#edecea;--navy:#222a46;--gold:#a98b3f;--ink:#0a0a0a;--soft:#4f575e;--line:#dcdad5;
    --sans:"Helvetica Neue",Helvetica,Arial,"Hiragino Sans","Yu Gothic",sans-serif;
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,Georgia,serif;
    --mono:ui-monospace,Menlo,Monaco,monospace;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased;
    font-feature-settings:"palt"}
  .wrap{max-width:760px;width:100%}
  .k{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(28px,6vw,46px);line-height:1.25;margin:16px 0 10px}
  .sub{color:var(--soft);margin:0 0 36px;font-size:16px;line-height:1.7;max-width:560px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:600px){.cards{grid-template-columns:1fr}}
  a.card{display:block;text-decoration:none;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:26px 26px 24px;color:var(--ink);transition:transform .15s,border-color .15s,box-shadow .15s}
  a.card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 14px 30px -18px rgba(0,0,0,.3)}
  a.card .n{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--gold)}
  a.card h2{font-family:var(--serif);font-weight:400;font-size:22px;margin:12px 0 6px}
  a.card p{margin:0;font-size:13.5px;color:var(--soft);line-height:1.6}
  a.card .go{display:inline-block;margin-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--gold)}
  .foot{margin-top:32px;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--soft);line-height:1.8}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 1080 220" width="340" style="max-width:80%;height:auto;display:block;margin-bottom:24px" aria-label="HPA">
      <rect x="0" y="0" width="1080" height="220" rx="34" fill="#222a46"/>
      <rect x="44" y="34" width="592" height="152" rx="76" fill="#ffffff"/>
      <line x1="104" y1="110" x2="556" y2="110" stroke="#a98b3f" stroke-width="7" stroke-linecap="round"/>
      <circle cx="104" cy="110" r="13" fill="#a98b3f"/>
      <circle cx="556" cy="110" r="28" fill="#a98b3f"/>
      <text x="855" y="118" text-anchor="middle" dominant-baseline="middle" fill="#ffffff"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="112" font-weight="600" letter-spacing="20">HPA</text>
    </svg>
    <div class="k">Preserve Golf Japan</div>
    <h1>橋本真和<br>パッティングアカデミー</h1>
    <p class="sub">事業提案と、オンラインアカデミーの画面イメージ。下のカードから。</p>
    <div class="cards">
      <a class="card" href="deck.html">
        <div class="n">01 / 提案</div>
        <h2>事業提案書</h2>
        <p>ビジョン・商品設計・コンテンツ計画・スケジュール。</p>
        <span class="go">開く →</span>
      </a>
      <a class="card" href="academy.html">
        <div class="n">02 / デモ</div>
        <h2>アカデミー画面イメージ</h2>
        <p>会員が見る学習画面のインタラクティブなモック。</p>
        <span class="go">開く →</span>
      </a>
    </div>
    <p class="foot">CONFIDENTIAL ・ 提案ドラフト ・ 価格は仮。<br>※レッスン名・構成はサンプル。実際の内容は橋本さんが設計。</p>
  </div>
</body>
</html>
